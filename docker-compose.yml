services:
  db:
    image: postgres:16-alpine
    container_name: menu-cost-app-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: menucostapp
      POSTGRES_USER: menucostapp
      POSTGRES_PASSWORD: menucostapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menucostapp -d menucostapp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
